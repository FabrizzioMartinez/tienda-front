<p-toast></p-toast>
<div class="card">
  <div class="header-container">
    <h3 class="title">Gestión de Clientes</h3>
    <button pButton 
            type="button" 
            label="Nuevo Cliente" 
            icon="pi pi-plus" 
            (click)="abrirModal()">
    </button>
  </div>
  
  <p-table 
    [value]="clientes" 
    [paginator]="true" 
    [rows]="10" 
    styleClass="p-datatable-striped clientes-table"
    [responsiveLayout]="'scroll'">
    
    <ng-template pTemplate="header">
      <tr>
        <th style="display:none">ID</th>
        <th>Nombre / Razón Social</th>
        <th>Tipo Doc.</th>
        <th>Número</th>
        <th>Email</th>
        <th>Teléfono</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-cliente>
      <tr>
        <td style="display:none">{{ cliente.clienteID }}</td>
        <td>{{ cliente.nombreRazonSocial }}</td>
        <td>{{ cliente.tipoDocumento }}</td>
        <td>{{ cliente.numeroDocumento }}</td>
        <td>{{ cliente.email }}</td>
        <td>{{ cliente.telefono }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" style="text-align:center;">No se encontraron clientes registrados.</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog header="Registrar Cliente" 
          [(visible)]="displayModal" 
          [modal]="true" 
          [style]="{width: '500px'}" 
          [draggable]="false" 
          [resizable]="false">
    
    <div class="p-fluid grid">
        
        <div class="col-12 field mb-3">
            <label for="nombre" class="font-semibold block mb-2">Nombre / Razón Social</label>
            <input id="nombre" type="text" pInputText [(ngModel)]="nuevoCliente.nombreRazonSocial" class="w-full" />
        </div>
        
        <div class="col-6 field mb-3">
            <label for="tipoDoc" class="font-semibold block mb-2">Tipo Documento</label>
            <p-select [options]="tiposDocumento" 
                      [(ngModel)]="nuevoCliente.tipoDocumento" 
                      placeholder="Seleccione"
                      styleClass="w-full">
            </p-select>
        </div>

        <div class="col-6 field mb-3">
            <label for="numero" class="font-semibold block mb-2">Número Documento</label>
            <input id="numero" type="text" pInputText [(ngModel)]="nuevoCliente.numeroDocumento" class="w-full" />
        </div>

        <div class="col-12 field mb-3">
            <label for="email" class="font-semibold block mb-2">Email</label>
            <input id="email" type="email" pInputText [(ngModel)]="nuevoCliente.email" class="w-full" />
        </div>

        <div class="col-12 field mb-3">
            <label for="telefono" class="font-semibold block mb-2">Teléfono</label>
            <input id="telefono" type="text" pInputText [(ngModel)]="nuevoCliente.telefono" class="w-full" />
        </div>
    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-content-end gap-2">
            <button pButton label="Cancelar" icon="pi pi-times" class="p-button-text p-button-secondary" (click)="cerrarModal()"></button>
            <button pButton label="Guardar" icon="pi pi-check" (click)="guardarCliente()"></button>
        </div>
    </ng-template>
</p-dialog>
