<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Sistema Tienda</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* Aplicamos la fuente a toda la estructura raíz y componentes de PrimeNG */
    html, body, 
    .p-component, 
    .p-dialog, 
    .p-select-overlay, 
    .p-datepicker-panel, 
    .p-datatable {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      background-color: #f8fafc;
      color: #0f172a;
    }

    /* Heredar fuente en controles de formulario */
    input, button, select, textarea {
      font-family: inherit !important;
    }

    /* 🔥 AQUÍ RECUPERAMOS EL LOOK DE TU CAPTURA ANTERIOR AUTOMÁTICAMENTE */
    .kpi-card h3 {
      font-weight: 700 !important;
      letter-spacing: 0.05em !important;   /* Separa las letras de los títulos de tus KPIs */
      text-transform: uppercase !important; /* Fuerza las mayúsculas de "TOTAL PRODUCTOS" */
      color: #64748b !important;
    }

    .kpi-card p {
      font-weight: 800 !important;          /* Devuelve el grosor imponente a tus números (ej: 27) */
      color: #0f172a !important;
    }
  </style>
</head>
<body>
  <app-root></app-root>
</body>
</html>
